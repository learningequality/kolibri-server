name: Release kolibri-server
on:
  release:
    types: [published]
  workflow_dispatch:
jobs:
  check_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
      - name: Extract version from changelog
        id: changelog_version
        run: |
          CHANGELOG_VERSION=$(dpkg-parsechangelog -S Version)
          echo "CHANGELOG_VERSION=${CHANGELOG_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Extract version from release tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ steps.changelog_version.outputs.CHANGELOG_VERSION }}" >> "$GITHUB_OUTPUT"
          else
            TAG_VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate Version consistency
        if: ${{ github.event_name != 'workflow_dispatch' }}
        id: version_check
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          CHANGELOG_VERSION: ${{ steps.changelog_version.outputs.CHANGELOG_VERSION }}
        run: |
          if [ "${VERSION}" != "${CHANGELOG_VERSION}" ]; then
            echo "Version mismatch: ${VERSION} != ${CHANGELOG_VERSION}"
            exit 1
          fi
          echo "Version check passed: ${VERSION}"
  build_package:
    runs-on: ubuntu-latest
    needs: check_version
    steps:
      - name: checkout codebase
        uses: actions/checkout@v4
      - name: Set changelog distribution to runner series
        run: |
          SERIES=$(. /etc/os-release && echo "$VERSION_CODENAME")
          sed -i "1s/) [a-z]*;/) ${SERIES};/" debian/changelog
          echo "Targeting series: ${SERIES}"
      - name: Install build and upload dependencies
        run: make install-upload-deps
      - name: Install Kolibri
        run: make install-kolibri
      - name: Write Launchpad credentials
        env:
          LP_CREDENTIALS: ${{ secrets.LP_CREDENTIALS }}
        run: |
          echo "$LP_CREDENTIALS" > /tmp/lp-creds.txt
      - name: Check if source already uploaded
        id: check_source
        env:
          LP_CREDENTIALS_FILE: /tmp/lp-creds.txt
        run: |
          if python3 scripts/launchpad_copy.py check-source \
            --package kolibri-server \
            --version "${{ needs.check_version.outputs.version }}"; then
            echo "already_uploaded=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_uploaded=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Import GPG key
        if: steps.check_source.outputs.already_uploaded != 'true'
        run: |
          echo -n "${{ secrets.GPG_SIGNING_KEY }}" | base64 --decode | gpg --import --no-tty --batch --yes
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent
          # Extract key ID from imported key so we don't need a separate secret
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long --with-colons | grep ^sec | head -1 | cut -d: -f5)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> "$GITHUB_ENV"
          echo "Imported GPG key: $GPG_KEY_ID"
      - name: Sign and upload package
        if: steps.check_source.outputs.already_uploaded != 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: make sign-and-upload
      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/lp-creds.txt /tmp/.gpg-passphrase
  build_binary_package:
    name: Build binary .deb for GitHub Pages PPA
    needs: check_version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
      - name: Install build dependencies
        run: make install-build-deps
      - name: Install Kolibri
        run: make install-kolibri
      - name: Build .deb package
        run: make deb
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: kolibri-server-deb
          path: ../kolibri-server_*.deb
  wait_for_source_published:
    needs:
      - check_version
      - build_package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-launchpadlib
      - name: Write Launchpad credentials
        env:
          LP_CREDENTIALS: ${{ secrets.LP_CREDENTIALS }}
        run: |
          echo "$LP_CREDENTIALS" > /tmp/lp-creds.txt
      - name: Wait for published binaries in source series
        env:
          LP_CREDENTIALS_FILE: /tmp/lp-creds.txt
        run: |
          SERIES=$(. /etc/os-release && echo "$VERSION_CODENAME")
          python3 scripts/launchpad_copy.py wait-for-published \
            --package kolibri-server \
            --version "${{ needs.check_version.outputs.version }}" \
            --series "$SERIES"
      - name: Cleanup Launchpad credentials
        if: always()
        run: rm -f /tmp/lp-creds.txt
  copy_to_other_distributions:
    needs: wait_for_source_published
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-launchpadlib
      - name: Write Launchpad credentials
        env:
          LP_CREDENTIALS: ${{ secrets.LP_CREDENTIALS }}
        run: |
          echo "$LP_CREDENTIALS" > /tmp/lp-creds.txt
      - name: Copy to other supported series
        env:
          LP_CREDENTIALS_FILE: /tmp/lp-creds.txt
        run: |
          python3 scripts/launchpad_copy.py copy-to-series
      - name: Cleanup Launchpad credentials
        if: always()
        run: rm -f /tmp/lp-creds.txt
  wait_for_copies_published:
    needs:
      - check_version
      - copy_to_other_distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-launchpadlib
      - name: Write Launchpad credentials
        env:
          LP_CREDENTIALS: ${{ secrets.LP_CREDENTIALS }}
        run: |
          echo "$LP_CREDENTIALS" > /tmp/lp-creds.txt
      - name: Wait for published binaries in all series
        env:
          LP_CREDENTIALS_FILE: /tmp/lp-creds.txt
        run: |
          python3 scripts/launchpad_copy.py wait-for-published \
            --package kolibri-server \
            --version "${{ needs.check_version.outputs.version }}"
      - name: Cleanup Launchpad credentials
        if: always()
        run: rm -f /tmp/lp-creds.txt
  block_release_step:
    name: Job to block publish of a release until it has been manually approved
    needs:
      - wait_for_copies_published
      - build_binary_package
    runs-on: ubuntu-latest
    environment: release
    steps:
      - run: echo "Release approved — proceeding to promote to kolibri PPA."
  copy_package_from_proposed_to_ppa:
    name: Promote packages from kolibri-proposed to kolibri
    needs:
      - check_version
      - block_release_step
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-launchpadlib
      - name: Write Launchpad credentials
        env:
          LP_CREDENTIALS: ${{ secrets.LP_CREDENTIALS }}
        run: |
          echo "$LP_CREDENTIALS" > /tmp/lp-creds.txt
      - name: Copy package from kolibri-proposed to kolibri
        env:
          LP_CREDENTIALS_FILE: /tmp/lp-creds.txt
        run: |
          python3 scripts/launchpad_copy.py promote \
            --version "${{ needs.check_version.outputs.version }}"
      - name: Wait for promoted packages to be published
        env:
          LP_CREDENTIALS_FILE: /tmp/lp-creds.txt
        run: |
          python3 scripts/launchpad_copy.py wait-for-published \
            --package kolibri-server \
            --version "${{ needs.check_version.outputs.version }}" \
            --ppa kolibri
      - name: Cleanup Launchpad credentials
        if: always()
        run: rm -f /tmp/lp-creds.txt
  publish_github_pages_ppa:
    name: Publish GitHub Pages PPA
    needs:
      - build_binary_package
      - block_release_step
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: github-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro
      - name: Set GPG key ID
        id: gpg
        run: |
          GPG_KEY_ID="${{ vars.DEBIAN_REPO_SIGNING_KEY_ID }}"
          if [ -z "$GPG_KEY_ID" ]; then
            echo "::error::No signing key ID provided (set vars.DEBIAN_REPO_SIGNING_KEY_ID)"
            exit 1
          fi
          echo "key-id=$GPG_KEY_ID" >> "$GITHUB_OUTPUT"
      - name: Import GPG signing key into isolated keyring
        run: |
          GNUPGHOME=$(mktemp -d)
          export GNUPGHOME
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          echo "pinentry-mode loopback" > "$GNUPGHOME/gpg.conf"
          echo "allow-loopback-pinentry" > "$GNUPGHOME/gpg-agent.conf"
          echo "${{ secrets.DEBIAN_REPO_SIGNING_KEY }}" | gpg --batch --import
          echo "${{ steps.gpg.outputs.key-id }}:6:" | gpg --batch --import-ownertrust
          gpgconf --kill gpg-agent
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: kolibri-server-deb
          path: incoming
      - name: Identify .deb file
        id: deb
        run: |
          DEB_FILE=$(find incoming -maxdepth 1 -name '*.deb' -print -quit)
          if [ -z "$DEB_FILE" ]; then
            echo "::error::No .deb file found in incoming/"
            exit 1
          fi
          echo "path=$DEB_FILE" >> "$GITHUB_OUTPUT"
          echo "Found: $DEB_FILE ($(du -h "$DEB_FILE" | cut -f1))"
      - name: Build APT repository with reprepro
        run: |
          mkdir -p repo/conf
          cat > repo/conf/distributions <<EOF
          Origin: Learning Equality
          Label: Kolibri Server
          Suite: stable
          Codename: stable
          Architectures: amd64 i386 arm64 armhf
          Components: main
          Description: Kolibri Server Debian repository
          SignWith: ${{ steps.gpg.outputs.key-id }}
          EOF
          reprepro -b repo includedeb stable "${{ steps.deb.outputs.path }}"
          gpg --armor --export "${{ steps.gpg.outputs.key-id }}" > repo/pubkey.asc
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
